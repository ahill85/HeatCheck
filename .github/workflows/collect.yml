name: Collect HeatCheck data

on:
  schedule:
    # Target ~every 15 minutes (GitHub may delay crons slightly)
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: heatcheck-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run collect

      - name: Commit updated snapshot
        run: |
          git config user.name "heatcheck-bot"
          git config user.email "heatcheck-bot@users.noreply.github.com"
          git add public/data/latest.json public/data/history.json public/data/highlights.json
          if git diff --staged --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore: refresh HeatCheck snapshot"
          git push
